<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legatio Finance</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <header class="hero">
        <img src="logo.svg" alt="Legatio Finance Logo" class="logo">
        <h1 class="fade-in">Legatio Finance</h1>
        <p class="fade-in">Tokenisation d'actifs réels en toute sécurité.</p>
    </header>

    <div class="container">
        <section class="features">
            <div class="feature fade-in">
                <i class="fas fa-home fa-2x"></i>
                <h2>Tokenisation Immobilière</h2>
                <p>Investissez dans l'immobilier grâce à la blockchain.</p>
            </div>
            <div class="feature fade-in">
                <i class="fas fa-wallet fa-2x"></i>
                <h2>Prêts adossés aux cryptos</h2>
                <p>Utilisez vos actifs numériques comme garantie.</p>
            </div>
        </section>

        <section class="simulator">
            <h2>Simulateur de Prêt</h2>
            <div class="simulator-form">
                <label for="loanAmount">Montant du prêt (USDT) :</label>
                <input type="number" id="loanAmount" value="1000" required>
                <label for="duration">Durée (mois) :</label>
                <input type="number" id="duration" value="12" required>
                <label for="interestRate">Taux d'intérêt (%) :</label>
                <input type="number" id="interestRate" value="5" required>
                <button onclick="calculateLoan()">Calculer</button>
            </div>
            <p>Montant total à rembourser : <span id="totalRepayment">0</span> USDT</p>
        </section>
    </div>

    <footer>
        <p><a href="#faq">FAQ</a> | <a href="mailto:legatio.finance@gmail.com">Contact</a></p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".fade-in", {opacity: 0, y: 50, duration: 1, stagger: 0.3, scrollTrigger: {trigger: ".fade-in", start: "top 90%"}});
        });
        function calculateLoan() {
            let amount = parseFloat(document.getElementById("loanAmount").value);
            let duration = parseFloat(document.getElementById("duration").value);
            let rate = parseFloat(document.getElementById("interestRate").value) / 100;
            if (isNaN(amount) || amount <= 0 || isNaN(duration) || duration <= 0 || isNaN(rate) || rate < 0) {
                document.getElementById("totalRepayment").innerText = "Entrées invalides";
                return;
            }
            let total = amount * (1 + rate * (duration / 12));
            document.getElementById("totalRepayment").innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
